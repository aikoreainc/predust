    <style>

            font-family: Arial, sans-serif;

        header {
            padding: 10px;
            background-color: #f2f2f2;
            display: flex;

        }

        .header-content {

            /* 비율을 유지하여 크기 조정 */

        .header-text {
            display: flex;

        /* 정보 표시 컨테이너 */

            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

</head>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://unpkg.com/leaflet-image/leaflet-image.js"></script>

    <script>
        // Leaflet Map Initialization
        var map = L.map('map', {
            center: [37.2865, 127.3780],
            zoom: 7
        });

        // 일반 지도 (OpenStreetMap)
        var osmLayer = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors'
        })  // 기본 레이어로 설정

        // 위성 지도 (Esri World Imagery)
        var satelliteLayer = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
            attribution: 'Tiles &copy; Esri'
        });

        // 기본 레이어 설정
        var baseLayers = {
            "일반 지도": osmLayer,
            "위성 지도": satelliteLayer
        };
        satelliteLayer.addTo(map);

        L.control.layers(baseLayers).addTo(map);

        // 현재 활성화된 레이어 추적
        let currentLayer = "satellite";  // 기본 레이어 이름 (일반 지도)

        map.on('baselayerchange', function (e) {
            if (e.name === "일반 지도") {
                currentLayer = "osm";
            } else if (e.name === "위성 지도") {
                currentLayer = "satellite";
            }
            updateMapMarkers();  // 레이어 변경 시 마커 업데이트
        });

        let markers = []; // Store map markers

        function clearMarkers() {
            markers.forEach(marker => marker.remove());
            markers = [];
            console.log('marker cleared');
        }

        // 페이지 로드 시에도 시즌 날짜를 업데이트
        document.addEventListener("DOMContentLoaded", function () {
            updateSeasonDates();
        });

        document.getElementById('capture-button').addEventListener('click', function () {
            domtoimage.toPng(document.getElementById('map'), { bgcolor: '#fff', width: document.getElementById('map').offsetWidth, height: document.getElementById('map').offsetHeight })
                .then(function (dataUrl) {
                    // 이미지 로드
                    const img = new Image();
                    img.src = dataUrl;
                    img.onload = function () {
                        // 캔버스 생성
                        const canvas = document.createElement('canvas');
                        const ctx = canvas.getContext('2d');

                        // 원본 이미지 크기
                        const originalWidth = img.width;
                        const originalHeight = img.height;

                        // 잘라낼 크기 계산
                        const leftCrop = originalWidth * 0.1;  // 좌 10%
                        const rightCrop = originalWidth * 0.1; // 우 10%
                        const topCrop = originalHeight * 0.02;   // 상 2%
                        const bottomCrop = originalHeight * 0.03; // 하 3%

                        const croppedWidth = originalWidth - leftCrop - rightCrop;
                        const croppedHeight = originalHeight - topCrop - bottomCrop;

                        // 캔버스 크기 설정
                        canvas.width = croppedWidth;
                        canvas.height = croppedHeight;

                        // 이미지 자르기
                        ctx.drawImage(
                            img,
                            leftCrop, topCrop, croppedWidth, croppedHeight, // 원본 이미지에서 잘라낼 부분
                            0, 0, croppedWidth, croppedHeight // 캔버스에 그릴 위치
                        );

                        // 잘라낸 이미지 데이터 URL 생성
                        const croppedDataUrl = canvas.toDataURL('image/png');

                        // 다운로드 링크 생성
                        const link = document.createElement('a');
                        link.href = croppedDataUrl;
                        link.download = 'map_capture_cropped.png';
                        document.body.appendChild(link);
                        link.click();
                        document.body.removeChild(link);
                    };
                })
                .catch(function (error) {
                    console.error('캡처 실패:', error);
                });
        });

        document.addEventListener("DOMContentLoaded", () => {
            const methodItems = document.querySelectorAll(".method-item");

            // 모든 method-item에 클릭 이벤트 추가
            methodItems.forEach(item => {
                item.addEventListener("click", () => {
                    // 이전 활성 상태 제거
                    document.querySelectorAll(".method-item").forEach(i => i.classList.remove("active"));

                    // 현재 클릭된 아이템 활성화
                    item.classList.add("active");

                    // 선택한 method에 대한 그래프 업데이트 로직 추가
                    const method = item.getAttribute("data-method");
                    updateGraphs(method);
                });
            });

            function updateGraphs(method) {
                const graphImage1 = document.getElementById("graph-image-1");

                // 이미지 경로 매핑 (측정 방법별 3개의 그래프)
                const methodToImages = {
                    "초미세먼지": [
                        "https://www.airkorea.or.kr/web/placeInfo/getImgFile?scrinId=16600&Dx=D0&imageSn=3",
                    ],
                    "미세먼지": [
                        "https://www.airkorea.or.kr/web/placeInfo/getImgFile?scrinId=16600&Dx=D0&imageSn=1",
                    ],
                    "오존": [
                        "https://www.airkorea.or.kr/web/placeInfo/getImgFile?scrinId=16600&Dx=D0&imageSn=7",
                    ],
                    "이산화질소": [
                        "https://www.airkorea.or.kr/web/placeInfo/getImgFile?scrinId=16600&Dx=D0&imageSn=5",
                    ]
                };

                const images = methodToImages[method] || [
                    "https://www.airkorea.or.kr/web/placeInfo/getImgFile?scrinId=16600&Dx=D0&imageSn=3",
                ];

                // 그래프 이미지 업데이트
                graphImage1.src = images[0];
            }
        });

        // Dummy functions to prevent JS reference errors
        function updateMapMarkers() {
            console.log('updateMapMarkers called (dummy)');
        }
        function updateSeasonDates() {
            console.log('updateSeasonDates called (dummy)');
        }
    </script>
